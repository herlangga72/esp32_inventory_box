<!-- Event Logs Page -->
<div class="action-bar">
    <div class="action-bar-left">
        <button class="btn btn-refresh" onclick="loadLogs()">Refresh</button>
        <button class="btn" onclick="downloadLogs()">Download CSV</button>
        <button class="btn btn-danger" onclick="clearLogs()">Clear Logs</button>
    </div>
    <div class="action-bar-right">
        <select class="form-input form-input-sm" id="log-limit" onchange="loadLogs()" style="width:100px;">
            <option value="50">50 rows</option>
            <option value="100" selected>100 rows</option>
            <option value="200">200 rows</option>
            <option value="500">500 rows</option>
        </select>
    </div>
</div>

<div class="card">
    <div class="card-header">
        Event Logs
        <span id="log-count" style="font-weight:normal;font-size:11px;color:var(--text-muted);"></span>
    </div>
    <div class="card-body no-padding">
        <table class="table">
            <thead>
                <tr>
                    <th style="width:160px;">Time</th>
                    <th style="width:80px;">Level</th>
                    <th style="width:100px;">Tag</th>
                    <th>Message</th>
                </tr>
            </thead>
            <tbody id="logs-table">
                <tr><td colspan="4" class="table-empty">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
function init_logs() {
    loadLogs();
}

const LEVEL_NAMES = ['NONE','ERROR','WARN','INFO','DEBUG'];
const LEVEL_CLASSES = ['muted','danger','warning','success','info'];

async function loadLogs() {
    const limit = document.getElementById('log-limit')?.value || 100;

    try {
        const data = await API.get(`/logs?limit=${limit}`);
        const tbody = document.getElementById('logs-table');

        if (!data.lg || data.lg.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="table-empty">No logs recorded</td></tr>';
            return;
        }

        document.getElementById('log-count').textContent =
            `Total: ${data.total || 0} | Dropped: ${data.dropped || 0} | Size: ${formatBytes(data.fileSize || 0)}`;

        tbody.innerHTML = data.lg.map(log => {
            const lvlName = LEVEL_NAMES[log.level] || '?';
            const lvlClass = LEVEL_CLASSES[log.level] || 'muted';
            return `
                <tr>
                    <td>${formatDate(log.ts)}</td>
                    <td><span class="badge badge-${lvlClass}">${lvlName}</span></td>
                    <td><span class="badge badge-light">${log.tag || '--'}</span></td>
                    <td>${log.msg || formatLogDetails(log)}</td>
                </tr>
            `;
        }).join('');
    } catch (err) {
        console.error('Load logs failed:', err);
        document.getElementById('logs-table').innerHTML =
            '<tr><td colspan="4" class="table-empty">Failed to load</td></tr>';
    }
}

function formatLogDetails(log) {
    const parts = [];
    if (log.tid) parts.push('Tool #' + log.tid);
    if (log.uid) parts.push('User #' + log.uid);
    if (log.w) parts.push(Number(log.w).toFixed(1) + 'g');
    return parts.join(' | ') || '--';
}

function downloadLogs() {
    window.open('/api/logs/download', '_blank');
}

async function clearLogs() {
    if (!confirm('Delete all log files? This cannot be undone.')) return;
    try {
        await API.post('/logs/clear');
        showToast('Logs cleared', 'success');
        loadLogs();
    } catch (err) {
        showToast('Clear failed', 'error');
    }
}

pageManager.registerPage('logs', { init: init_logs });
window.loadLogs = loadLogs;
window.downloadLogs = downloadLogs;
window.clearLogs = clearLogs;
</script>
