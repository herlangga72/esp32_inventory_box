<!-- Configuration Page -->
<div class="card">
    <div class="card-header">Sensor Configuration</div>
    <div class="card-body">
        <div class="form-row">
            <div class="form-row-label">Weight Threshold</div>
            <input type="number" class="form-input form-row-input" id="cfg-threshold" value="2.0" step="0.1">
            <span class="form-row-suffix">grams</span>
        </div>
        <div class="form-row">
            <div class="form-row-label">Settling Time</div>
            <input type="number" class="form-input form-row-input" id="cfg-settling" value="3000">
            <span class="form-row-suffix">ms</span>
        </div>
        <div class="form-row">
            <div class="form-row-label">Motion Threshold</div>
            <input type="number" class="form-input form-row-input" id="cfg-motion" value="0.15" step="0.01">
            <span class="form-row-suffix">G</span>
        </div>
        <div style="margin-top:15px;">
            <button class="btn btn-primary" onclick="saveSensorConfig()">Save Sensor Settings</button>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">Power Management</div>
    <div class="card-body">
        <div class="form-row">
            <div class="form-row-label">Light Sleep After</div>
            <input type="number" class="form-input form-row-input" id="cfg-lightsleep" value="30">
            <span class="form-row-suffix">seconds</span>
        </div>
        <div class="form-row">
            <div class="form-row-label">Deep Sleep After</div>
            <input type="number" class="form-input form-row-input" id="cfg-deepsleep" value="60">
            <span class="form-row-suffix">seconds</span>
        </div>
        <div style="margin-top:15px;">
            <button class="btn btn-primary" onclick="savePowerConfig()">Save Power Settings</button>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">Matching Settings</div>
    <div class="card-body">
        <div class="form-row">
            <div class="form-row-label">Default Tolerance</div>
            <input type="number" class="form-input form-row-input" id="cfg-tolerance" value="2.0" step="0.1">
            <span class="form-row-suffix">grams</span>
        </div>
        <div class="form-row">
            <div class="form-row-label">Max Contents</div>
            <input type="number" class="form-input form-row-input" id="cfg-maxcontents" value="10">
            <span class="form-row-suffix">items</span>
        </div>
        <div style="margin-top:15px;">
            <button class="btn btn-primary" onclick="saveMatchingConfig()">Save Matching Settings</button>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">Factory Reset</div>
    <div class="card-body">
        <p style="margin-bottom:15px;color:var(--text-muted);">This will delete all tools, users, and logs. Use with caution.</p>
        <button class="btn btn-danger" onclick="factoryReset()">Factory Reset</button>
    </div>
</div>

<script>
function init_config() {
    // Load current config from device
    loadConfig();
}

async function loadConfig() {
    try {
        const data = await API.get('/config');
        // Device could return current values to populate form
        // For now, use defaults from the HTML
    } catch (err) {
        console.error('Load config failed:', err);
    }
}

async function saveSensorConfig() {
    const config = {
        threshold: parseFloat(document.getElementById('cfg-threshold').value),
        settlingTime: parseInt(document.getElementById('cfg-settling').value),
        motionThreshold: parseFloat(document.getElementById('cfg-motion').value)
    };
    
    try {
        await API.post('/config', config);
        showToast('Sensor settings saved', 'success');
    } catch (err) {
        showToast('Failed to save settings', 'error');
    }
}

async function savePowerConfig() {
    const config = {
        lightSleepTimeout: parseInt(document.getElementById('cfg-lightsleep').value) * 1000,
        deepSleepTimeout: parseInt(document.getElementById('cfg-deepsleep').value) * 1000
    };
    
    try {
        await API.post('/config', config);
        showToast('Power settings saved', 'success');
    } catch (err) {
        showToast('Failed to save settings', 'error');
    }
}

async function saveMatchingConfig() {
    const config = {
        defaultTolerance: parseFloat(document.getElementById('cfg-tolerance').value),
        maxContents: parseInt(document.getElementById('cfg-maxcontents').value)
    };
    
    try {
        await API.post('/config', config);
        showToast('Matching settings saved', 'success');
    } catch (err) {
        showToast('Failed to save settings', 'error');
    }
}

async function factoryReset() {
    showConfirm('Factory Reset', 'This will delete ALL data including tools, users, and logs. This cannot be undone!', 'doFactoryReset');
}

async function doFactoryReset() {
    try {
        await API.post('/config', { factoryReset: true });
        showToast('Factory reset complete. Restarting...', 'success');
        setTimeout(() => {
            fetch(API_BASE + '/restart', { method: 'POST' });
        }, 1000);
    } catch (err) {
        showToast('Factory reset failed', 'error');
    }
}
pageManager.registerPage('config', { init: init_config });
</script>
