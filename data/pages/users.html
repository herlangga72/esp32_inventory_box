<!-- Users Management Page -->
<div class="card" style="margin-bottom:15px;">
    <div class="card-header">User Login</div>
    <div class="card-body">
        <div class="login-inline">
            <span>Enter PIN:</span>
            <input type="password" class="form-input form-input-sm" id="login-pin" maxlength="4" placeholder="----">
            <button class="btn btn-primary" onclick="login()">Login</button>
            <button class="btn" onclick="logout()" style="margin-left:5px;">Logout</button>
        </div>
    </div>
</div>

<div class="action-bar">
    <div class="action-bar-left">
        <button class="btn btn-primary" onclick="showAddUserModal()">+ Add User</button>
    </div>
    <div class="action-bar-right">
        <button class="btn btn-refresh" onclick="loadUsers()">Refresh</button>
    </div>
</div>

<div class="card">
    <div class="card-header">Registered Users</div>
    <div class="card-body no-padding">
        <table class="table">
            <thead>
                <tr>
                    <th style="width:60px;">ID</th>
                    <th>Name</th>
                    <th style="width:80px;">FP ID</th>
                    <th style="width:80px;">Status</th>
                    <th style="width:150px;">Actions</th>
                </tr>
            </thead>
            <tbody id="users-table">
                <tr><td colspan="5" class="table-empty">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
function init_users() {
    loadUsers();
}

async function loadUsers() {
    try {
        const data = await API.get('/users');
        const tbody = document.getElementById('users-table');
        
        if (!data.users || data.users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="table-empty">No users registered</td></tr>';
            return;
        }
        
        tbody.innerHTML = data.users.map(user => `
            <tr>
                <td>${user.id}</td>
                <td>${user.name}</td>
                <td>${user.fpId > 0 ? '<span style="color:var(--success);">#' + user.fpId + '</span>' : '<span style="color:var(--text-muted);">--</span>'}</td>
                <td><span class="badge ${user.active ? 'badge-success' : 'badge-muted'}">${user.active ? 'Active' : 'Inactive'}</span></td>
                <td>
                    <button class="btn btn-sm" onclick="editUser(${user.id})">Edit</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteUser(${user.id})">Delete</button>
                </td>
            </tr>
        `).join('');
    } catch (err) {
        console.error('Load users failed:', err);
        document.getElementById('users-table').innerHTML = '<tr><td colspan="5" class="table-empty">Failed to load</td></tr>';
    }
}

async function login() {
    const pin = document.getElementById('login-pin').value;
    
    if (pin.length !== 4) {
        showToast('PIN must be 4 digits', 'warning');
        return;
    }
    
    try {
        const data = await API.post('/users/login', { pin });
        if (data.success) {
            document.getElementById('user-display').textContent = data.name;
            document.getElementById('login-pin').value = '';
            showToast(`Logged in as ${data.name}`, 'success');
        } else {
            showToast('Invalid PIN', 'error');
        }
    } catch (err) {
        showToast('Login failed', 'error');
    }
}

function showAddUserModal() {
    showModal('Add New User', `
        <div class="form-group">
            <label class="form-label">Name</label>
            <input type="text" class="form-input" id="user-name" placeholder="User name">
        </div>
        <div class="form-group">
            <label class="form-label">PIN (4 digits)</label>
            <input type="password" class="form-input form-input-sm" id="user-pin" maxlength="4" placeholder="----">
        </div>
        <div class="form-group">
            <label class="form-label">Fingerprint ID (optional)</label>
            <input type="number" class="form-input form-input-sm" id="user-fpid" min="1" max="127" placeholder="Leave empty to skip">
        </div>
    `, `
        <button class="btn" onclick="hideModal()">Cancel</button>
        <button class="btn btn-primary" onclick="createUser()">Add User</button>
    `);
}

async function createUser() {
    const name = document.getElementById('user-name').value.trim();
    const pin = document.getElementById('user-pin').value;
    const fpIdInput = document.getElementById('user-fpid').value;
    const fpId = fpIdInput ? parseInt(fpIdInput) : -1;

    if (!name || pin.length !== 4) {
        showToast('Please fill all fields (PIN must be 4 digits)', 'error');
        return;
    }

    try {
        const body = fpId > 0 ? { name, pin, fpId } : { name, pin };
        await API.post('/users', body);
        hideModal();
        showToast('User added', 'success');
        loadUsers();
    } catch (err) {
        showToast('Failed to add user', 'error');
    }
}

async function deleteUser(id) {
    showConfirm('Delete User', 'Are you sure you want to delete this user?', `doDeleteUser(${id})`);
}

async function editUser(id) {
    try {
        const data = await API.get('/users/' + id);
        showModal('Edit User #' + id, `
            <div class="form-group">
                <label class="form-label">Name</label>
                <input type="text" class="form-input" id="edit-name" value="${data.name || ''}">
            </div>
            <div class="form-group">
                <label class="form-label">PIN (leave empty to keep)</label>
                <input type="password" class="form-input form-input-sm" id="edit-pin" maxlength="4" placeholder="----">
            </div>
            <div class="form-group">
                <label class="form-label">Fingerprint ID</label>
                <input type="number" class="form-input form-input-sm" id="edit-fpid" min="1" max="127" value="${data.fpId > 0 ? data.fpId : ''}" placeholder="${data.fpId > 0 ? 'Current: #' + data.fpId : 'Not assigned'}">
            </div>
        `, `
            <button class="btn" onclick="hideModal()">Cancel</button>
            <button class="btn btn-primary" onclick="doEditUser(${id})">Save</button>
        `);
    } catch (err) {
        showToast('Failed to load user', 'error');
    }
}

async function doEditUser(id) {
    const name = document.getElementById('edit-name').value.trim();
    const pin = document.getElementById('edit-pin').value;
    const fpIdInput = document.getElementById('edit-fpid').value;
    const body = {};
    if (name) body.name = name;
    if (pin) body.pin = pin;
    if (fpIdInput) body.fpId = parseInt(fpIdInput);

    try {
        await API.put('/users/' + id, body);
        hideModal();
        showToast('User updated', 'success');
        loadUsers();
    } catch (err) {
        showToast('Update failed', 'error');
    }
}

async function logout() {
    try {
        await API.post('/users/logout');
        document.getElementById('user-display').textContent = 'Not logged in';
        document.getElementById('login-pin').value = '';
        showToast('Logged out', 'success');
    } catch (err) {
        showToast('Logout failed', 'error');
    }
}

async function doDeleteUser(id) {
    try {
        await API.delete('/users/' + id);
        showToast('User deleted', 'success');
        loadUsers();
    } catch (err) {
        showToast('Failed to delete user', 'error');
    }
}

// Global exports
window.loadUsers = loadUsers;
window.showAddUserModal = showAddUserModal;
window.createUser = createUser;
window.login = login;
</script>
