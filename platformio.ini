[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial
monitor_speed = 115200
upload_speed = 921600

; Partition scheme - default with SPIFFS
board_build.partitions = default.csv
board_build.filesystem = spiffs

; Custom FreeRTOS Configuration
build_flags = 
    ; Tick rate - 1kHz for real-time response
    -DCONFIG_FREERTOS_HZ=1000
    
    ; Enable tickless idle for power saving
    -DCONFIG_FREERTOS_USE_TICKLESS_IDLE=y
    
    ; Single core - save memory, use only core 0
    -DCONFIG_FREERTOS_UNICORE=y
    
    ; Optimize idle task stack
    -DCONFIG_FREERTOS_IDLE_TASK_STACKSIZE=1024
    
    ; Timer task configuration
    -DCONFIG_FREERTOS_TIMER_TASK_STACK_DEPTH=2048
    -DCONFIG_FREERTOS_TIMER_TASK_PRIORITY=6
    
    ; Fast ISR handlers in RAM
    -DCONFIG_ESP_INTR_ALLOC_FLAGS=ESP_INTR_FLAG_IRAM
    
    ; Optimize memory
    -DCONFIG_ESP_SYSTEM_EVENT_QUEUE_SIZE=8
    -DCONFIG_ESP_TASK_WDT_EN=n
    
    ; Power management
    -DCONFIG_ESP_SLEEP_POWER_DOWN_FACTOR=1
    
    ; Disable debug
    -DCORE_DEBUG_LEVEL=3

; Library dependencies
lib_deps = 
    Wire
    WiFi
    WebServer
    Preferences
    SPIFFS

; Upload options
upload_resetmethod = espota
; upload_port = 192.168.1.100

[env:esp32dev.upload]
upload_speed = 921600

[env:esp32dev.debug]
debug_tool = esp-prog

[env:spiffs]
board_build.partitions = spiffs.csv