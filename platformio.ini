[env:native]
platform = native
build_flags =
    -Isrc
    -Isrc/config
    -Itest/stubs
    -std=c++11
    -w

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial
monitor_speed = 115200
upload_speed = 460800

; Partition scheme - default with SPIFFS
board_build.partitions = default.csv
board_build.filesystem = spiffs

; Custom FreeRTOS Configuration
build_flags =
    -Isrc
    -Isrc/config
    ; === Size optimization ===
    -Os
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -fno-exceptions
    -fno-rtti
    -fno-unwind-tables
    -fno-asynchronous-unwind-tables
    -fno-threadsafe-statics
    -fno-use-cxa-atexit
    ; Strip optional features from release build
    -DRELEASE_BUILD
    ; Uncomment to disable auto light sleep (keeps USB serial alive for debugging)
    -DDEBUG_DISABLE_LIGHT_SLEEP

; Library dependencies
lib_deps =
    Wire
    WiFi
    WebServer
    Preferences
    SPIFFS
    Adafruit Fingerprint Sensor Library

; Exclude non-critical framework libs
lib_ignore =
    ESPmDNS
    ArduinoOTA

; Upload options
upload_resetmethod = espota
; upload_port = 192.168.1.100

; Debug tool (requires debug probe)
; debug_tool = esp-prog

; OTA notes:
;   Build:   pio run
;   Upload:  pio run -t upload --upload-port inventory-box.local
;   Or:      make ota OTA_HOST=inventory-box.local

[env:esp32dev-wokwi]
extends = env:esp32dev
build_flags =
    ${env:esp32dev.build_flags}
    -DWOKWI_SIM